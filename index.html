<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ADMIN PANEL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#070312;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#120822;
border:1px solid rgba(155,48,255,.25);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

h1{
margin-bottom:20px;
}

h2{
margin-bottom:15px;
font-size:20px;
}

input,
select{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:12px;
background:#0b0515;
color:white;
outline:none;
border:1px solid #2c1847;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#9b30ff,#00e5ff);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
opacity:.9;
}

.preview-banner{
margin-top:15px;
border-radius:16px;
overflow:hidden;
border:1px solid #2d1a4b;
}

.preview-banner img,
.preview-banner video{
width:100%;
display:block;
max-height:280px;
object-fit:cover;
}

.product-card{
background:#0b0515;
border:1px solid #24113d;
padding:15px;
border-radius:16px;
margin-top:12px;
display:flex;
gap:15px;
align-items:center;
}

.product-card img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
}

.product-info{
flex:1;
}

.pin-badge{
display:inline-block;
padding:5px 10px;
background:#ffb300;
color:black;
font-size:12px;
border-radius:50px;
margin-top:6px;
font-weight:bold;
}

.checkbox-wrap{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.checkbox-wrap input{
width:auto;
margin:0;
transform:scale(1.3);
}

.category-item{
padding:12px;
background:#0b0515;
border-radius:12px;
margin-top:10px;
border:1px solid #24113d;
}

#adminPanel{
display:none;
}

</style>
</head>
<body>

<div class="container">

<div id="loginBox" class="card">

<h1>LOGIN ADMIN</h1>

<input
type="email"
id="loginEmail"
placeholder="Email Admin"
>

<input
type="password"
id="loginPassword"
placeholder="Password Admin"
>

<button onclick="loginAdmin()">
LOGIN
</button>

</div>

<div id="adminPanel">

<div class="card">

<h1>⚙️ ADMIN STORE</h1>

<input type="text" id="storeName" placeholder="Nama Store">

<input type="text" id="bannerUrl" placeholder="URL Banner IMG / MP4">

<input type="text" id="urlAdmin" placeholder="URL Admin">

<input type="text" id="urlChannel" placeholder="URL Channel">

<input type="text" id="urlGroup" placeholder="URL Grup">

<button onclick="saveSettings()">
SIMPAN SETTINGS
</button>

<div class="preview-banner" id="bannerPreview"></div>

</div>


<div class="card">

<h2>TAMBAH KATEGORI</h2>

<input
type="text"
id="categoryName"
placeholder="Nama kategori"
>

<button onclick="addCategory()">
TAMBAH KATEGORI
</button>

<div id="categoryList"></div>

</div>


<div class="card">

<h2>TAMBAH PRODUK</h2>

<input
type="text"
id="productName"
placeholder="Nama Produk"
>

<input
type="number"
id="productPrice"
placeholder="Harga Produk"
>

<input
type="text"
id="productThumbnail"
placeholder="URL Thumbnail"
>

<select id="productCategory">
<option value="">
Pilih Kategori
</option>
</select>

<div class="checkbox-wrap">

<input
type="checkbox"
id="productPin"
>

<label for="productPin">
Pin Produk
</label>

</div>

<button onclick="addProduct()">
TAMBAH PRODUK
</button>

<div id="productList"></div>

</div>

<button onclick="logoutAdmin()">
LOGOUT
</button>

</div>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
set,
onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// ================= FIREBASE CONFIG =================

const firebaseConfig = {

apiKey: "AIzaSyA9tSehgxD2Pgb7YPy7Pq-_bcuKLKswyos",

authDomain:
"ipung-store-2b96d.firebaseapp.com",

databaseURL"https://ipung-store-2b96d-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:
"ipung-store-2b96d",

storageBucket:
"ipung-store-2b96d.firebasestorage.app",

messagingSenderId:
"906202337063",

appId:
"1:906202337063:web:1a39b7bad99a85b23c2302"

};


// ================= INIT =================

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

const auth =
getAuth(app);


// ================= LOGIN =================

window.loginAdmin = async function(){

const email =
document.getElementById("loginEmail").value;

const password =
document.getElementById("loginPassword").value;

if(!email || !password){

alert("Isi email dan password");

return;

}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

alert("Login berhasil");

}catch(err){

alert(err.message);

}

};


// ================= LOGOUT =================

window.logoutAdmin = async function(){

await signOut(auth);

};


// ================= AUTH STATE =================

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("loginBox")
.style.display = "none";

document.getElementById("adminPanel")
.style.display = "block";

loadStore();

}else{

document.getElementById("loginBox")
.style.display = "block";

document.getElementById("adminPanel")
.style.display = "none";

}

});


// ================= STORE DATA =================

let storeData = {

settings:{},

categories:{},

products:{}

};


// ================= LOAD STORE =================

function loadStore(){

onValue(ref(db,"store"),(snapshot)=>{

const data = snapshot.val();

if(data){

storeData = data;

}

renderSettings();
renderBannerPreview();
renderCategories();
renderProducts();

});

}


// ================= RENDER SETTINGS =================

function renderSettings(){

document.getElementById("storeName").value =
storeData.settings?.storeName || "";

document.getElementById("bannerUrl").value =
storeData.settings?.banner || "";

document.getElementById("urlAdmin").value =
storeData.settings?.urlAdmin || "";

document.getElementById("urlChannel").value =
storeData.settings?.urlChannel || "";

document.getElementById("urlGroup").value =
storeData.settings?.urlGroup || "";

}


// ================= SAVE SETTINGS =================

window.saveSettings = async function(){

const settings = {

storeName:
document.getElementById("storeName").value,

banner:
document.getElementById("bannerUrl").value,

urlAdmin:
document.getElementById("urlAdmin").value,

urlChannel:
document.getElementById("urlChannel").value,

urlGroup:
document.getElementById("urlGroup").value

};

await set(
ref(db,"store/settings"),
settings
);

alert("Settings berhasil disimpan");

};


// ================= BANNER =================

function renderBannerPreview(){

const preview =
document.getElementById("bannerPreview");

const banner =
storeData.settings?.banner || "";

if(!banner){

preview.innerHTML = "";

return;

}

if(banner.includes(".mp4")){

preview.innerHTML = `
<video controls autoplay muted loop>
<source src="${banner}" type="video/mp4">
</video>
`;

}else{

preview.innerHTML = `
<img src="${banner}">
`;

}

}


// ================= ADD CATEGORY =================

window.addCategory = async function(){

const categoryName =
document.getElementById("categoryName")
.value
.trim();

if(!categoryName){

alert("Isi kategori");

return;

}

const id = Date.now();

await set(
ref(db,"store/categories/"+id),
{
id:id,
name:categoryName
}
);

document.getElementById("categoryName").value="";

alert("Kategori berhasil");

};


// ================= RENDER CATEGORY =================

function renderCategories(){

const categoryList =
document.getElementById("categoryList");

const productCategory =
document.getElementById("productCategory");

categoryList.innerHTML = "";

productCategory.innerHTML = `
<option value="">
Pilih Kategori
</option>
`;

const categories =
Object.values(storeData.categories || {});

categories.forEach(cat=>{

categoryList.innerHTML += `
<div class="category-item">
${cat.name}
</div>
`;

productCategory.innerHTML += `
<option value="${cat.name}">
${cat.name}
</option>
`;

});

}


// ================= ADD PRODUCT =================

window.addProduct = async function(){

const name =
document.getElementById("productName").value;

const price =
document.getElementById("productPrice").value;

const thumbnail =
document.getElementById("productThumbnail").value;

const category =
document.getElementById("productCategory").value;

const pinned =
document.getElementById("productPin").checked;

if(
!name ||
!price ||
!thumbnail ||
!category
){

alert("Lengkapi data");

return;

}

const id = Date.now();

await set(
ref(db,"store/products/"+id),
{
id,
name,
price,
thumbnail,
category,
pinned
}
);

document.getElementById("productName").value="";
document.getElementById("productPrice").value="";
document.getElementById("productThumbnail").value="";
document.getElementById("productCategory").value="";
document.getElementById("productPin").checked=false;

alert("Produk berhasil");

};


// ================= RENDER PRODUCTS =================

function renderProducts(){

const wrap =
document.getElementById("productList");

wrap.innerHTML = "";

const products =
Object.values(storeData.products || {});

products
.sort((a,b)=>b.pinned-a.pinned)
.forEach(prod=>{

wrap.innerHTML += `
<div class="product-card">

<img src="${prod.thumbnail}">

<div class="product-info">

<h3>${prod.name}</h3>

<p>
Rp ${Number(prod.price)
.toLocaleString("id-ID")}
</p>

<p>${prod.category}</p>

${prod.pinned
? '<div class="pin-badge">PINNED</div>'
: ''
}

</div>

</div>
`;

});

}

</script>

</body>
  </html>
