<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#070312;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#120822;
border:1px solid rgba(155,48,255,.25);
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

h1{
margin-bottom:20px;
}

h2{
margin-bottom:15px;
font-size:20px;
}

input,
select{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:12px;
background:#0b0515;
color:white;
outline:none;
border:1px solid #2c1847;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#9b30ff,#00e5ff);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.preview-banner{
margin-top:15px;
border-radius:16px;
overflow:hidden;
border:1px solid #2d1a4b;
}

.preview-banner img,
.preview-banner video{
width:100%;
display:block;
max-height:280px;
object-fit:cover;
}

.product-card{
background:#0b0515;
border:1px solid #24113d;
padding:15px;
border-radius:16px;
margin-top:12px;
display:flex;
gap:15px;
align-items:center;
}

.product-card img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
}

.product-info{
flex:1;
}

.pin-badge{
display:inline-block;
padding:5px 10px;
background:#ffb300;
color:black;
font-size:12px;
border-radius:50px;
margin-top:6px;
font-weight:bold;
}

.checkbox-wrap{
display:flex;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.checkbox-wrap input{
width:auto;
margin:0;
transform:scale(1.3);
}

.category-item{
padding:12px;
background:#0b0515;
border-radius:12px;
margin-top:10px;
border:1px solid #24113d;
}
</style>
</head>
<body>

<div class="container">

<h1>⚙️ ADMIN STORE PANEL</h1>

<div class="card">
<h2>SETTINGS STORE</h2>

<input type="text" id="storeName" placeholder="Nama Store">

<input type="text" id="bannerUrl" placeholder="URL Banner IMG / MP4">

<input type="text" id="urlAdmin" placeholder="URL Admin">
<input type="text" id="urlChannel" placeholder="URL Channel">
<input type="text" id="urlGroup" placeholder="URL Grup">

<button onclick="saveSettings()">SIMPAN SETTINGS</button>

<div class="preview-banner" id="bannerPreview"></div>
</div>

<div class="card">
<h2>SETTINGS KATEGORI</h2>

<input type="text" id="categoryName" placeholder="Nama Kategori">

<button onclick="addCategory()">TAMBAH KATEGORI</button>

<div id="categoryList"></div>
</div>

<div class="card">
<h2>SETTINGS PRODUK</h2>

<input type="text" id="productName" placeholder="Nama Produk">

<input type="number" id="productPrice" placeholder="Harga Produk">

<input type="text" id="productThumbnail" placeholder="URL Thumbnail">

<select id="productCategory">
<option value="">Pilih Kategori</option>
</select>

<div class="checkbox-wrap">
<input type="checkbox" id="productPin">
<label for="productPin">Pin Produk</label>
</div>

<button onclick="addProduct()">TAMBAH PRODUK</button>

<div id="productList"></div>
</div>

</div>

<script>
const API_URL = "https://ipungg-storee-default-rtdb.firebaseio.com";

let storeData = {
settings:{},
categories:[],
products:[]
};

async function loadData(){

try{

const res = await fetch(API_URL);
const data = await res.json();

if(data){
storeData = data;
}

renderAll();

}catch(err){
console.log(err);
}

}

function renderAll(){

renderBannerPreview();
renderCategories();
renderProducts();

}

function renderBannerPreview(){

const preview = document.getElementById('bannerPreview');
const banner = storeData.settings.banner || '';

if(!banner){
preview.innerHTML = '';
return;
}

if(banner.includes('.mp4')){
preview.innerHTML = `
<video controls autoplay muted loop>
<source src="${banner}" type="video/mp4">
</video>
`;
}else{
preview.innerHTML = `
<img src="${banner}">
`;
}

}

function renderCategories(){

const list = document.getElementById('categoryList');
const select = document.getElementById('productCategory');

list.innerHTML = '';
select.innerHTML = '<option value="">Pilih Kategori</option>';

storeData.categories.forEach(cat=>{

list.innerHTML += `
<div class="category-item">
${cat.name}
</div>
`;

select.innerHTML += `
<option value="${cat.name}">
${cat.name}
</option>
`;

});

}

function renderProducts(){

const wrap = document.getElementById('productList');

wrap.innerHTML = '';

const sorted = [...storeData.products].sort((a,b)=>b.pinned-a.pinned);

sorted.forEach(prod=>{

wrap.innerHTML += `
<div class="product-card">

<img src="${prod.thumbnail}">

<div class="product-info">
<h3>${prod.name}</h3>
<p>Rp ${Number(prod.price).toLocaleString('id-ID')}</p>
<p>${prod.category}</p>

${prod.pinned ? '<div class="pin-badge">PINNED</div>' : ''}

</div>

</div>
`;

});

}

async function saveDatabase(){

await fetch(API_URL,{
method:'PUT',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify(storeData)
});

}

async function saveSettings(){

storeData.settings = {
storeName:document.getElementById('storeName').value,
banner:document.getElementById('bannerUrl').value,
urlAdmin:document.getElementById('urlAdmin').value,
urlChannel:document.getElementById('urlChannel').value,
urlGroup:document.getElementById('urlGroup').value
};

await saveDatabase();

renderBannerPreview();

alert('Settings berhasil disimpan');

}

async function addCategory(){

const name = document.getElementById('categoryName').value;

if(!name){
alert('Isi nama kategori');
return;
}

storeData.categories.push({
id:Date.now(),
name
});

await saveDatabase();

renderCategories();

document.getElementById('categoryName').value='';

}

async function addProduct(){

const name = document.getElementById('productName').value;
const price = document.getElementById('productPrice').value;
const thumbnail = document.getElementById('productThumbnail').value;
const category = document.getElementById('productCategory').value;
const pinned = document.getElementById('productPin').checked;

if(!name || !price || !thumbnail || !category){
alert('Lengkapi data produk');
return;
}

storeData.products.push({
id:Date.now(),
name,
price,
thumbnail,
category,
pinned
});

await saveDatabase();

renderProducts();

// reset

document.getElementById('productName').value='';
document.getElementById('productPrice').value='';
document.getElementById('productThumbnail').value='';
document.getElementById('productCategory').value='';
document.getElementById('productPin').checked=false;

alert('Produk berhasil ditambah');

}

loadData();
</script>

</body>
  </html>
